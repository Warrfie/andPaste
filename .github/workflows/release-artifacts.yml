name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      signed:
        description: Build a signed, notarized, and stapled DMG
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build DMG Artifact
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Swift Test
        run: swift test

      - name: Import Developer ID Certificate
        if: startsWith(github.ref, 'refs/tags/v') || inputs.signed
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          KEYCHAIN_PATH: ${{ runner.temp }}/copypaste-signing.keychain-db
        run: ./scripts/install-ci-macos-certificate.sh

      - name: Build DMG
        env:
          DMG_BASENAME: copypaste-${{ github.ref_name }}
          OUTPUT_DIR: ${{ github.workspace }}/build/artifacts
          KEYCHAIN_PATH: ${{ runner.temp }}/copypaste-signing.keychain-db
          SIGNING_ALLOWED: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.signed) && 'YES' || 'NO' }}
          NOTARIZATION_ALLOWED: ${{ (startsWith(github.ref, 'refs/tags/v') || inputs.signed) && 'YES' || 'NO' }}
          CODE_SIGN_IDENTITY_VALUE: AUTO
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: ./scripts/build-dmg.sh

      - name: Delete Temporary Keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/copypaste-signing.keychain-db" || true

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v7
        with:
          name: copypaste-dmg-${{ github.ref_name }}
          path: |
            build/artifacts/*.dmg
            build/artifacts/*.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release Assets
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Release $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" build/artifacts/*.dmg build/artifacts/*.sha256 --clobber
